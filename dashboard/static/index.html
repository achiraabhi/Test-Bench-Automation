<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autobench</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --accent:  #388bfd;
  --green:   #3fb950;
  --yellow:  #d29922;
  --red:     #f85149;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
}

body {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Header ── */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.25rem;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
}
.hdr-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  text-decoration: none;
}
.hdr-logo img { height: 28px; display: block; }
.hdr-logo-text {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.hdr-logo-text span { color: var(--muted); font-weight: 400; }
.hdr-sep { flex: 1; }

/* ── Layout ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 270px;
  min-width: 270px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 0.85rem 1rem 0.5rem;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

/* ── Instrument card (sidebar) ── */
.instr-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.7rem 0.8rem;
  transition: border-color 0.2s;
}
.instr-card.ok  { border-color: #238636; }
.instr-card.err { border-color: var(--red); }

.instr-name {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-weight: 600;
  font-size: 0.85rem;
  margin-bottom: 0.2rem;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-green  { background: var(--green); box-shadow: 0 0 5px var(--green); }
.dot-grey   { background: var(--muted); }
.dot-red    { background: var(--red);   box-shadow: 0 0 5px var(--red); }
.dot-pulse  { animation: pulse 1.2s ease-in-out infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.instr-idn {
  font-size: 0.68rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 0.15rem;
}
.instr-res {
  font-size: 0.65rem;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  margin-bottom: 0.45rem;
}
.instr-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text);
  font-size: 0.75rem;
  padding: 0.25rem 1.6rem 0.25rem 0.5rem;
  appearance: none;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%238b949e' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 0.4rem center;
  background-size: 14px;
  cursor: pointer;
}
.instr-select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(56,139,253,.2);
}
.instr-fixed-mtype {
  font-size: 0.72rem;
  color: var(--accent);
  margin-top: 0.2rem;
}
.instr-disconnected {
  font-size: 0.72rem;
  color: var(--red);
  margin-top: 0.2rem;
}

/* ── Content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* ── Empty state ── */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  color: var(--muted);
  text-align: center;
  padding: 3rem 1rem;
}
.empty i { font-size: 3.5rem; color: var(--border); }
.empty strong { color: var(--text); }

/* ── Live value cards ── */
.live-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.75rem;
}

.val-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 0.9rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 105px;
  justify-content: center;
}
.val-card-name {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.2rem;
}
.val-card-param {
  font-size: 0.72rem;
  color: var(--accent);
  margin-bottom: 0.35rem;
}
.val-card-num {
  font-size: 1.75rem;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.val-card-unit {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 0.15rem;
}
.val-card-ts {
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 0.35rem;
}

/* Yokogawa spans full width */
.yoko-wide {
  grid-column: 1 / -1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.9rem 1rem;
}
.yoko-title {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 0.15rem;
}
.yoko-sub {
  font-size: 0.72rem;
  color: var(--accent);
  margin-bottom: 0.6rem;
}
.yoko-vals {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0.4rem;
}
.yoko-item { text-align: center; }
.yoko-item-lbl  { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; }
.yoko-item-val  { font-size: 1.05rem; font-weight: 600; font-family: 'Courier New', monospace; }
.yoko-item-unit { font-size: 0.6rem; color: var(--muted); }
.yoko-ts {
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 0.5rem;
  text-align: right;
}

/* ── Chart ── */
.chart-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.9rem 1rem 0.75rem;
}
.box-title {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 0.6rem;
}
.chart-wrap {
  position: relative;
  height: 190px;
}

/* ── Log table ── */
.log-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  flex-shrink: 0;
}
.log-head {
  padding: 0.55rem 0.9rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.log-scroll {
  max-height: 200px;
  overflow-y: auto;
}
table.log {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.72rem;
}
table.log th {
  position: sticky;
  top: 0;
  background: var(--surface);
  color: var(--muted);
  font-weight: 500;
  padding: 0.35rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
table.log td {
  padding: 0.3rem 0.75rem;
  border-bottom: 1px solid rgba(48,54,61,.4);
  font-family: 'Courier New', monospace;
  white-space: nowrap;
}
table.log tr:hover td { background: rgba(56,139,253,.05); }
table.log tr.err-row td { color: var(--red); }

/* ── Status bar ── */
.statusbar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0 1.25rem;
  height: 30px;
  display: flex;
  align-items: center;
  gap: 1.25rem;
  font-size: 0.72rem;
  color: var(--muted);
  flex-shrink: 0;
}
.statusbar .flex1 { flex: 1; }
#statusMsg.info  { color: var(--accent); }
#statusMsg.warn  { color: var(--yellow); }
#statusMsg.error { color: var(--red); }

/* ── Buttons ── */
.btn-hdr {
  font-size: 0.78rem;
  padding: 0.3rem 0.7rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  white-space: nowrap;
  transition: background .15s, border-color .15s;
}
.btn-hdr:hover { background: rgba(255,255,255,.06); }
.btn-hdr:disabled { opacity: .45; cursor: default; }
.btn-hdr.green  { border-color: #238636; color: var(--green); }
.btn-hdr.green:hover  { background: rgba(35,134,54,.15); }
.btn-hdr.red    { border-color: #6e211e; color: var(--red); }
.btn-hdr.red:hover    { background: rgba(248,81,73,.12); }
.btn-hdr.accent { border-color: var(--accent); color: var(--accent); }
.btn-hdr.accent:hover { background: rgba(56,139,253,.12); }

/* Scan spinner */
@keyframes spin { to { transform: rotate(360deg); } }
.scan-spinner {
  width: 11px; height: 11px;
  border: 2px solid rgba(56,139,253,.3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}

/* Interval */
.interval-wrap {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.72rem;
  color: var(--muted);
}
input[type=range] {
  width: 80px;
  accent-color: var(--accent);
  cursor: pointer;
}
#ivLabel { min-width: 30px; color: var(--text); }

/* WS indicator */
.ws-ind { display: flex; align-items: center; gap: 0.35rem; }
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
.ws-dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <img src="/static/noratel-logo.png" alt="Noratel">
    <span class="hdr-logo-text">Auto<span>bench</span></span>
  </div>

  <button class="btn-hdr accent" id="btnScan">
    <i class="bi bi-search"></i> Scan
  </button>

  <button class="btn-hdr green hidden" id="btnStart">
    <i class="bi bi-play-fill"></i> Start
  </button>
  <button class="btn-hdr red hidden" id="btnStop">
    <i class="bi bi-stop-fill"></i> Stop
  </button>

  <div class="interval-wrap">
    <span>Interval</span>
    <input type="range" id="ivRange" min="0.5" max="30" step="0.5" value="2">
    <span id="ivLabel">2.0 s</span>
  </div>

  <div class="hdr-sep"></div>

  <button class="btn-hdr" id="btnExport" title="Download all readings as CSV">
    <i class="bi bi-download"></i> CSV
  </button>
  <button class="btn-hdr" id="btnClear" title="Clear reading history">
    <i class="bi bi-trash"></i> Clear
  </button>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">Instruments</div>
    <div class="sidebar-body" id="sidebarBody">
      <div class="empty" style="padding:2rem .5rem;flex:0">
        <i class="bi bi-usb-plug" style="font-size:2rem"></i>
        <span style="font-size:.8rem">Click <strong>Scan</strong> to discover</span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">

    <!-- Empty state -->
    <div class="empty" id="emptyState">
      <i class="bi bi-broadcast"></i>
      <div>
        <strong>No instruments connected</strong><br>
        <span style="font-size:.85rem">Plug in your devices and click <strong>Scan</strong></span>
      </div>
    </div>

    <!-- Live cards (hidden until instruments connected) -->
    <div class="live-grid hidden" id="liveGrid"></div>

    <!-- History chart -->
    <div class="chart-box hidden" id="chartBox">
      <div class="box-title">Reading History</div>
      <div class="chart-wrap">
        <canvas id="histCanvas"></canvas>
      </div>
    </div>

    <!-- Data log -->
    <div class="log-box hidden" id="logBox">
      <div class="log-head">
        <span class="box-title" style="margin:0">Data Log</span>
        <span style="font-size:.72rem;color:var(--muted)" id="logCount">0 rows</span>
      </div>
      <div class="log-scroll">
        <table class="log">
          <thead>
            <tr>
              <th>Time</th>
              <th>Instrument</th>
              <th>Parameter</th>
              <th>Value</th>
              <th>Unit</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- .content -->
</div><!-- .layout -->

<!-- STATUS BAR -->
<div class="statusbar">
  <div class="ws-ind">
    <div class="ws-dot" id="wsDot"></div>
    <span id="wsLabel">Disconnected</span>
  </div>
  <span class="flex1" id="statusMsg"></span>
  <span id="readCount">0 readings</span>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const COLORS = ['#388bfd','#3fb950','#d29922','#a371f7','#f0883e','#39d353','#ff7b72','#58a6ff'];
const MAX_CHART = 100;
const MAX_LOG   = 300;

const DISPLAY_NAMES = {
  keysight: 'Keysight DMM',
  fluke:    'Fluke 8845A',
  yokogawa: 'Yokogawa WT310',
  hioki:    'Hioki RM3545',
};

// ── State ──────────────────────────────────────────────────────────────────────
let ws, running = false, instruments = [], totalReadings = 0;
let chartSeries = {};   // seriesKey → { times:[], values:[] }
let chart;
let batchMode = false;

// ── Utility ───────────────────────────────────────────────────────────────────
function baseName(label) {
  return label.replace(/_\d+$/, '');
}
function displayName(label) {
  const base = baseName(label);
  const suffix = /_(\d+)$/.test(label) ? ' #' + label.match(/_(\d+)$/)[1] : '';
  return (DISPLAY_NAMES[base] || label) + suffix;
}
function fmtNum(v) {
  if (v === null || v === undefined) return '---';
  const a = Math.abs(v);
  if (a === 0)      return '0.000';
  if (a >= 10000)   return v.toFixed(1);
  if (a >= 100)     return v.toFixed(2);
  if (a >= 1)       return v.toFixed(4);
  if (a >= 0.001)   return v.toFixed(6);
  return v.toExponential(3);
}
function shortTime(ts) {
  return ts ? (ts.split('T')[1] || ts).slice(0, 12) : '—';
}
function setStatus(msg, level = 'info') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = level;
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('histCanvas').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 10, padding: 12 } },
        tooltip: {
          backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
          titleColor: '#8b949e', bodyColor: '#e6edf3',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)}`,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 10, maxRotation: 0 },
          grid: { color: 'rgba(48,54,61,.4)' },
        },
        y: {
          ticks: { color: '#8b949e', font: { size: 10 } },
          grid: { color: 'rgba(48,54,61,.4)' },
        },
      },
    },
  });
}

function addChartPoint(seriesKey, ts, value) {
  if (!chart || typeof value !== 'number') return;
  if (!chartSeries[seriesKey]) chartSeries[seriesKey] = { times: [], values: [] };
  const s = chartSeries[seriesKey];
  s.times.push(shortTime(ts).slice(0, 8));
  s.values.push(value);
  if (s.values.length > MAX_CHART) { s.times.shift(); s.values.shift(); }
  if (!batchMode) rebuildChart();
}

function rebuildChart() {
  if (!chart) return;
  const keys = Object.keys(chartSeries);
  if (!keys.length) { chart.data.labels = []; chart.data.datasets = []; chart.update('none'); return; }
  const maxLen = Math.max(...keys.map(k => chartSeries[k].values.length));
  const longestKey = keys.reduce((a, b) =>
    chartSeries[a].values.length >= chartSeries[b].values.length ? a : b);
  chart.data.labels = chartSeries[longestKey].times;
  chart.data.datasets = keys.map((key, i) => {
    const s = chartSeries[key];
    const pad = maxLen - s.values.length;
    return {
      label: key,
      data: [...Array(pad).fill(null), ...s.values],
      borderColor: COLORS[i % COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: 2,
      pointRadius: 2,
      tension: 0.3,
      spanGaps: true,
    };
  });
  chart.update('none');
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('wsDot').classList.add('on');
    document.getElementById('wsLabel').textContent = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').classList.remove('on');
    document.getElementById('wsLabel').textContent = 'Disconnected';
    setTimeout(connect, 3000);
  };
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    switch (m.type) {
      case 'instruments': onInstruments(m.data); break;
      case 'reading':     onReading(m.data);     break;
      case 'history':     onHistory(m.data);     break;
      case 'control':     onControl(m.running);  break;
      case 'status':      setStatus(m.message, m.level); break;
      case 'interval':    onInterval(m.value);   break;
      case 'cleared':     clearAll();            break;
    }
  };
}

// ── Handlers ──────────────────────────────────────────────────────────────────
function onInstruments(data) {
  instruments = data;
  renderSidebar();
  const hasConn = instruments.some(i => i.connected);
  document.getElementById('emptyState').classList.toggle('hidden', hasConn);
  document.getElementById('liveGrid').classList.toggle('hidden', !hasConn);
  document.getElementById('chartBox').classList.toggle('hidden', !hasConn);
  document.getElementById('logBox').classList.toggle('hidden', !hasConn);
  document.getElementById('btnStart').classList.toggle('hidden', !hasConn || running);
  document.getElementById('btnStop').classList.toggle('hidden', !hasConn || !running);
  if (hasConn) renderLiveCards();
}

function onReading(r) {
  totalReadings++;
  document.getElementById('readCount').textContent = totalReadings + ' readings';

  if (r.error) {
    updateCard(r.label, null, null, null, r.error, r.ts);
    appendLog(r.ts, r.label, 'ERROR', r.error, '', true);
    return;
  }
  if (r.multi) {
    updateYokoCard(r.label, r.values, r.ts);
    const v = r.values['Voltage']?.value;
    if (typeof v === 'number') addChartPoint(displayName(r.label) + ' V', r.ts, v);
    const w = r.values['Power']?.value;
    if (typeof w === 'number') addChartPoint(displayName(r.label) + ' W', r.ts, w);
    for (const [param, obj] of Object.entries(r.values)) {
      appendLog(r.ts, r.label, param, obj.value, obj.unit, false);
    }
    return;
  }
  const num = typeof r.value === 'number' ? r.value : null;
  updateCard(r.label, r.param, num, r.unit, r.value, r.ts);
  if (num !== null) addChartPoint(displayName(r.label), r.ts, num);
  appendLog(r.ts, r.label, r.param || '', r.value, r.unit || '', false);
}

function onHistory(data) {
  batchMode = true;
  data.forEach(r => onReading(r));
  batchMode = false;
  rebuildChart();
}

function onControl(isRunning) {
  running = isRunning;
  const hasConn = instruments.some(i => i.connected);
  document.getElementById('btnStart').classList.toggle('hidden', !hasConn || isRunning);
  document.getElementById('btnStop').classList.toggle('hidden', !hasConn || !isRunning);
  // Pulse status dots
  document.querySelectorAll('.dot-green').forEach(d =>
    d.classList.toggle('dot-pulse', isRunning)
  );
}

function onInterval(val) {
  document.getElementById('ivRange').value = val;
  document.getElementById('ivLabel').textContent = val.toFixed(1) + ' s';
}

function clearAll() {
  chartSeries = {};
  totalReadings = 0;
  rebuildChart();
  document.getElementById('logBody').innerHTML = '';
  document.getElementById('logCount').textContent = '0 rows';
  document.getElementById('readCount').textContent = '0 readings';
  // Reset live card values
  document.querySelectorAll('[data-val]').forEach(el => { el.textContent = '---'; el.style.color = ''; });
  document.querySelectorAll('[data-yval]').forEach(el => { el.textContent = '---'; });
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  const body = document.getElementById('sidebarBody');
  if (!instruments.length) {
    body.innerHTML = '<div style="font-size:.78rem;color:var(--muted);padding:.5rem;text-align:center">No instruments found</div>';
    return;
  }
  body.innerHTML = instruments.map(inst => {
    const cls = inst.connected ? 'ok' : 'err';
    const dotCls = inst.connected ? 'dot-green' : 'dot-red';
    let control = '';
    if (inst.connected) {
      if (inst.options.length > 1) {
        const opts = inst.options.map(o =>
          `<option value="${o}" ${o === inst.measuring ? 'selected' : ''}>${o}</option>`
        ).join('');
        control = `<select class="instr-select" onchange="setMeasure('${inst.label}',this.value)">${opts}</select>`;
      } else {
        control = `<div class="instr-fixed-mtype">${inst.measuring}</div>`;
      }
    } else {
      control = `<div class="instr-disconnected">Not connected</div>`;
    }
    return `<div class="instr-card ${cls}">
      <div class="instr-name"><div class="dot ${dotCls}"></div>${displayName(inst.label)}</div>
      <div class="instr-idn" title="${inst.idn}">${inst.idn}</div>
      <div class="instr-res">${inst.resource}</div>
      ${control}
    </div>`;
  }).join('');
}

// ── Live cards ────────────────────────────────────────────────────────────────
function renderLiveCards() {
  const grid = document.getElementById('liveGrid');
  const connected = instruments.filter(i => i.connected);
  if (!connected.length) { grid.innerHTML = ''; return; }

  let html = '';
  for (const inst of connected) {
    if (inst.base === 'yokogawa') {
      const items = ['Voltage','Current','Power','Apparent','Reactive','PF','Freq'].map(p => `
        <div class="yoko-item">
          <div class="yoko-item-lbl">${p}</div>
          <div class="yoko-item-val" data-yval="${inst.label}-${p}">---</div>
          <div class="yoko-item-unit" id="yoku-${inst.label}-${p}"></div>
        </div>`).join('');
      html += `<div class="yoko-wide">
        <div class="yoko-title">${displayName(inst.label)}</div>
        <div class="yoko-sub">All Power Quantities</div>
        <div class="yoko-vals">${items}</div>
        <div class="yoko-ts" id="yts-${inst.label}">—</div>
      </div>`;
    } else {
      html += `<div class="val-card">
        <div class="val-card-name">${displayName(inst.label)}</div>
        <div class="val-card-param" id="param-${inst.label}">${inst.measuring}</div>
        <div class="val-card-num" data-val="${inst.label}" id="val-${inst.label}">---</div>
        <div class="val-card-unit" id="unit-${inst.label}"></div>
        <div class="val-card-ts" id="ts-${inst.label}">—</div>
      </div>`;
    }
  }
  grid.innerHTML = html;
}

function updateCard(label, param, num, unit, rawVal, ts) {
  const valEl  = document.getElementById(`val-${label}`);
  if (!valEl) return;
  if (param) { const p = document.getElementById(`param-${label}`); if (p) p.textContent = param; }
  if (unit)  { const u = document.getElementById(`unit-${label}`);  if (u) u.textContent = unit; }
  const tsEl = document.getElementById(`ts-${label}`);
  if (tsEl) tsEl.textContent = shortTime(ts);
  if (num !== null) {
    valEl.textContent = fmtNum(num);
    valEl.style.color = '';
  } else {
    const s = String(rawVal ?? '---');
    valEl.textContent = s;
    valEl.style.color = (s === 'OL' || s === 'UL') ? 'var(--yellow)' : 'var(--red)';
  }
}

function updateYokoCard(label, values, ts) {
  for (const [p, obj] of Object.entries(values)) {
    const el  = document.querySelector(`[data-yval="${label}-${p}"]`);
    const uel = document.getElementById(`yoku-${label}-${p}`);
    if (el)  el.textContent  = (obj.value !== null && obj.value !== undefined) ? fmtNum(obj.value) : '---';
    if (uel) uel.textContent = obj.unit;
  }
  const tsEl = document.getElementById(`yts-${label}`);
  if (tsEl) tsEl.textContent = shortTime(ts);
}

// ── Log table ─────────────────────────────────────────────────────────────────
let logRowCount = 0;

function appendLog(ts, label, param, value, unit, isErr) {
  const tbody = document.getElementById('logBody');
  if (!tbody) return;
  logRowCount++;
  const tr = document.createElement('tr');
  if (isErr) tr.className = 'err-row';
  const valStr = typeof value === 'number' ? fmtNum(value) : String(value ?? '');
  tr.innerHTML = `<td>${shortTime(ts)}</td><td>${displayName(label)}</td><td>${param}</td><td>${valStr}</td><td>${unit}</td>`;
  tbody.insertBefore(tr, tbody.firstChild);
  while (tbody.rows.length > MAX_LOG) tbody.deleteRow(tbody.rows.length - 1);
  document.getElementById('logCount').textContent = Math.min(logRowCount, MAX_LOG) + ' rows';
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function scan() {
  const btn = document.getElementById('btnScan');
  btn.disabled = true;
  btn.innerHTML = '<span class="scan-spinner"></span> Scanning…';
  try {
    await fetch('/api/scan');
    // instruments update arrives via WebSocket
  } catch (e) {
    setStatus('Scan error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-search"></i> Scan';
  }
}

async function startMeasure() {
  const r = await fetch('/api/start', { method: 'POST' }).then(r => r.json());
  if (r.error) setStatus(r.error, 'warn');
}

async function stopMeasure() {
  await fetch('/api/stop', { method: 'POST' });
}

async function setMeasure(label, mtype) {
  await fetch(`/api/measure/${encodeURIComponent(label)}/${encodeURIComponent(mtype)}`, { method: 'POST' });
}

async function setInterval(val) {
  await fetch(`/api/interval/${val}`, { method: 'POST' });
}

async function clearReadings() {
  logRowCount = 0;
  await fetch('/api/clear', { method: 'POST' });
}

// ── Wire events ───────────────────────────────────────────────────────────────
document.getElementById('btnScan').addEventListener('click', scan);
document.getElementById('btnStart').addEventListener('click', startMeasure);
document.getElementById('btnStop').addEventListener('click', stopMeasure);
document.getElementById('btnClear').addEventListener('click', clearReadings);
document.getElementById('btnExport').addEventListener('click', () => { window.location.href = '/api/export'; });

document.getElementById('ivRange').addEventListener('input', function () {
  document.getElementById('ivLabel').textContent = parseFloat(this.value).toFixed(1) + ' s';
});
document.getElementById('ivRange').addEventListener('change', function () {
  setInterval(parseFloat(this.value));
});

// ── Boot ──────────────────────────────────────────────────────────────────────
initChart();
connect();
</script>

</html>
